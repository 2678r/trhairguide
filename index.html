      display: inline-block;

      color: #1d4ed8;
      font-size: 13px;
      border: 1px solid #dbeafe;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0 0 14px;
      font-size: 42px;
      line-height: 1.15;

      max-width: 620px;

      background: #f8fafc;
      border: 1px solid #e5e7eb;
      border-radius: 18px;
      padding: 20px 22px;
    }

    .info-box h2 {
      margin: 0 0 10px;
      font-size: 20px;
      color: #0f172a;
    }

    .info-box ul {
      margin: 0;
      padding-left: 20px;
      color: #475569;
      line-height: 1.8;
    }

    .footer {
      margin-top: 24px;
      font-size: 14px;
      color: #64748b;
    }

    .footer a {
      color: #2563eb;
      text-decoration: none;
    }

    .footer a:hover {
      text-decoration: underline;
    }

    @media (max-width: 640px) {
      .card {
        padding: 32px 20px;
      }

      h1 {
        font-size: 30px;
      }

      .sub {
        font-size: 16px;
