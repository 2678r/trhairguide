<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TR Hair Guide</title>
    <style>
      :root {
        --bg: #07111f;
        --panel: rgba(10, 20, 36, 0.78);
        --line: rgba(255, 255, 255, 0.09);
        --text: #e8eef9;
        --muted: #94a3b8;
        --cyan: #22d3ee;
        --violet: #8b5cf6;
        --emerald: #10b981;
        --amber: #f59e0b;
        --rose: #fb7185;
      }

      * { box-sizing: border-box; }

      html, body {
        margin: 0;
        padding: 0;
        background:
          radial-gradient(circle at top left, rgba(34, 211, 238, 0.16), transparent 28%),
          radial-gradient(circle at top right, rgba(139, 92, 246, 0.14), transparent 30%),
          radial-gradient(circle at bottom center, rgba(16, 185, 129, 0.10), transparent 30%),
          var(--bg);
        color: var(--text);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      h1, h2, h3, p { margin: 0; }
      a { color: inherit; text-decoration: none; }

      .container {
        width: min(1220px, calc(100% - 32px));
        margin: 28px auto;
      }

      .hero,
      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.25);
      }

      .hero {
        border-radius: 28px;
        overflow: hidden;
        margin-bottom: 24px;
      }

      .hero-top {
        display: flex;
        justify-content: space-between;
        gap: 24px;
        padding: 28px 32px 20px;
        border-bottom: 1px solid var(--line);
      }

      .eyebrow {
        font-size: 12px;
        letter-spacing: 0.28em;
        text-transform: uppercase;
        color: rgba(34, 211, 238, 0.86);
        margin-bottom: 10px;
      }

      h1 {
        font-size: clamp(28px, 5vw, 42px);
        line-height: 1.08;
        margin-bottom: 10px;
      }

      .sub {
        max-width: 760px;
        color: var(--muted);
        line-height: 1.7;
        font-size: 14px;
      }

      .domain-box {
        min-width: 220px;
        align-self: flex-start;
        border: 1px solid rgba(34, 211, 238, 0.18);
        background: rgba(34, 211, 238, 0.08);
        border-radius: 18px;
        padding: 14px 16px;
      }

      .domain-box .label {
        font-size: 12px;
        color: #c7f9ff;
        margin-bottom: 6px;
      }

      .domain-box .value {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 14px;
      }

      .stats {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 14px;
        padding: 22px 32px 30px;
      }

      .stat-card {
        background: rgba(0, 0, 0, 0.18);
        border: 1px solid var(--line);
        border-radius: 20px;
        padding: 16px;
      }

      .stat-card .label {
        font-size: 12px;
        color: var(--muted);
        margin-bottom: 10px;
      }

      .stat-card .value {
        font-size: 30px;
        font-weight: 700;
        margin-bottom: 12px;
      }

      .bar {
        height: 6px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.06);
        overflow: hidden;
      }

      .bar > span {
        display: block;
        height: 100%;
        border-radius: 999px;
        background: linear-gradient(90deg, var(--cyan), var(--violet));
      }

      .grid {
        display: grid;
        grid-template-columns: 1.4fr 0.9fr;
        gap: 24px;
      }

      .panel {
        border-radius: 28px;
        padding: 22px;
      }

      .panel-header {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        align-items: flex-start;
        margin-bottom: 18px;
      }

      .panel-header p {
        margin-top: 6px;
        color: var(--muted);
        font-size: 14px;
      }

      .mini-tag {
        align-self: center;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.04);
        color: #cbd5e1;
        border-radius: 999px;
        padding: 7px 12px;
        font-size: 12px;
      }

      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-bottom: 18px;
      }

      .toolbar input,
      .toolbar select {
        appearance: none;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.04);
        color: var(--text);
        border-radius: 14px;
        padding: 10px 12px;
        font-size: 13px;
        outline: none;
      }

      .toolbar input {
        min-width: 240px;
        flex: 1 1 260px;
      }

      .table-wrap {
        overflow-x: auto;
        border-radius: 20px;
      }

      .database-table {
        width: 100%;
        border-collapse: collapse;
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.03);
      }

      .database-table thead th {
        text-align: left;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: #7c8aa5;
        background: rgba(255, 255, 255, 0.04);
        padding: 14px 12px;
        border-bottom: 1px solid var(--line);
        white-space: nowrap;
      }

      .database-table tbody td {
        padding: 14px 12px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        vertical-align: top;
        font-size: 13px;
        line-height: 1.55;
      }

      .database-table tbody tr:hover {
        background: rgba(255, 255, 255, 0.035);
      }

      .database-table tbody tr:last-child td { border-bottom: none; }

      .cell-title {
        font-weight: 600;
        color: white;
      }

      .cell-sub {
        margin-top: 4px;
        color: var(--muted);
        font-size: 12px;
      }

      .doctor-grid,
      .steps {
        display: grid;
        gap: 12px;
      }

      .doctor-card,
      .step-card {
        border: 1px solid var(--line);
        background: rgba(0, 0, 0, 0.18);
        border-radius: 22px;
        padding: 16px;
      }

      .doctor-head {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: flex-start;
      }

      .doctor-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 12px;
      }

      .small-tag {
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.04);
        border-radius: 999px;
        padding: 6px 10px;
        font-size: 12px;
        color: #cbd5e1;
      }

      .accent {
        margin-top: 12px;
        font-size: 14px;
        color: #9ae6ff;
      }

      .doctor-note {
        margin-top: 8px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.7;
      }

      .step-wrap {
        display: flex;
        gap: 12px;
        align-items: flex-start;
      }

      .step-no {
        border: 1px solid rgba(34, 211, 238, 0.18);
        background: rgba(34, 211, 238, 0.10);
        color: #baf7ff;
        border-radius: 12px;
        padding: 5px 8px;
        font-size: 12px;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      }

      .step-title {
        font-size: 14px;
        font-weight: 600;
        margin-bottom: 4px;
      }

      .step-text {
        font-size: 14px;
        color: var(--muted);
        line-height: 1.65;
      }

      .pill {
        border-radius: 999px;
        border: 1px solid transparent;
        padding: 5px 10px;
        font-size: 12px;
        font-weight: 600;
        display: inline-flex;
        align-items: center;
        white-space: nowrap;
      }

      .tone-high { background: rgba(16, 185, 129, 0.15); color: #bbf7d0; border-color: rgba(16, 185, 129, 0.2); }
      .tone-medium { background: rgba(245, 158, 11, 0.15); color: #fde68a; border-color: rgba(245, 158, 11, 0.2); }
      .tone-low { background: rgba(148, 163, 184, 0.15); color: #e2e8f0; border-color: rgba(148, 163, 184, 0.2); }
      .tone-core { background: rgba(34, 211, 238, 0.15); color: #cffafe; border-color: rgba(34, 211, 238, 0.2); }
      .tone-secondary { background: rgba(96, 165, 250, 0.15); color: #dbeafe; border-color: rgba(96, 165, 250, 0.2); }
      .tone-hidden { background: rgba(251, 113, 133, 0.15); color: #ffe4e6; border-color: rgba(251, 113, 133, 0.2); }

      @media (max-width: 1024px) {
        .grid { grid-template-columns: 1fr; }
      }

      @media (max-width: 720px) {
        .container {
          width: min(100% - 20px, 1220px);
          margin: 16px auto 22px;
        }

        .hero-top,
        .stats,
        .panel {
          padding-left: 16px;
          padding-right: 16px;
        }

        .hero-top { flex-direction: column; }
        .stats { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <section class="hero">
        <div class="hero-top">
          <div>
            <div class="eyebrow">TR Hair Guide</div>
            <h1>土耳其植发真实数据库</h1>
            <p class="sub">先做事实层数据库，再做分析。优先展示机构模型、网页可见度、医生参与度与基础口碑数据。</p>
          </div>
          <div class="domain-box">
            <div class="label">Domain</div>
            <div class="value">trhairguide.com</div>
          </div>
        </div>
        <div class="stats" id="stats"></div>
      </section>

      <section class="grid">
        <section class="panel">
          <div class="panel-header">
            <div>
              <h2>机构数据库</h2>
              <p>按事实字段浏览机构，不再用大卡片展示。</p>
            </div>
            <div class="mini-tag">clinic database</div>
          </div>

          <div class="toolbar">
            <input id="searchInput" type="text" placeholder="搜索诊所 / 区域 / 机构模型" />
            <select id="visibilityFilter">
              <option value="all">全部可见度</option>
              <option value="core">核心可见</option>
              <option value="secondary">次级可见</option>
              <option value="hidden">隐藏/不透明</option>
            </select>
            <select id="relatedFilter">
              <option value="all">全部级别</option>
              <option value="high">high</option>
              <option value="medium">medium</option>
              <option value="low">low</option>
            </select>
          </div>

          <div class="table-wrap">
            <table class="database-table">
              <thead>
                <tr>
                  <th>机构</th>
                  <th>区域</th>
                  <th>机构模型</th>
                  <th>可见度</th>
                  <th>医生参与</th>
                  <th>市场</th>
                  <th>评分</th>
                  <th>备注</th>
                </tr>
              </thead>
              <tbody id="clinicTableBody"></tbody>
            </table>
          </div>
        </section>

        <section style="display:grid; gap:24px;">
          <section class="panel">
            <div class="panel-header">
              <div>
                <h2>核心医生数据库</h2>
                <p>只保留真正有决策价值的医生，按数据库卡片展示。</p>
              </div>
              <div class="mini-tag">surgeon layer</div>
            </div>
            <div class="doctor-grid" id="doctorList"></div>
          </section>

          <section class="panel">
            <div class="panel-header">
              <div>
                <h2>建议工作流</h2>
                <p>保持数据结构统一，后面扩展会更快。</p>
              </div>
            </div>
            <div class="steps" id="steps"></div>
          </section>
        </section>
      </section>
    </div>

      const steps = [

        hidden: "tone-hidden"
      };

      const clinicModelLabel = {

      const stats = [

        ["医生总数", doctors.length],
        ["核心植发", clinics.filter(c => c.hair_visibility === "core").length],
        ["隐藏跳过", clinics.filter(c => c.hair_visibility === "hidden").length]
      ];

      document.getElementById("stats").innerHTML = stats.map(([label, value]) => `
        <div class="stat-card">
          <div class="label">${label}</div>
          <div class="value">${value}</div>
          <div class="bar"><span style="width:${Math.min(100, value * 18)}%"></span></div>
        </div>
      `).join("");

      function renderClinicTable() {
        const q = document.getElementById("searchInput").value.trim().toLowerCase();
        const visibility = document.getElementById("visibilityFilter").value;
        const related = document.getElementById("relatedFilter").value;

        const filtered = clinics.filter((clinic) => {
          const text = [
            clinic.official_name,
            clinic.clinic_name,
            clinic.district,
            clinic.clinic_model,
            clinic.doctor_involvement,
            clinic.target_market
          ].join(" ").toLowerCase();

          const matchQ = !q || text.includes(q);
          const matchVisibility = visibility === "all" || clinic.hair_visibility === visibility;
          const matchRelated = related === "all" || clinic.hair_related === related;
          return matchQ && matchVisibility && matchRelated;
        });

        document.getElementById("clinicTableBody").innerHTML = filtered.map((clinic) => `
          <tr>
            <td>
              <div class="cell-title">${clinic.clinic_name}</div>
              <div class="cell-sub">${clinic.official_name}</div>
            </td>
            <td>${clinic.district}<div class="cell-sub">${clinic.facility_type}</div></td>
            <td>${clinicModelLabel[clinic.clinic_model] || clinic.clinic_model}</td>
            <td><span class="pill ${toneMap[clinic.hair_visibility]}">${clinic.hair_visibility}</span></td>
            <td>${surgeryLabel[clinic.doctor_involvement] || clinic.doctor_involvement}</td>
            <td>${clinic.target_market}</td>
            <td>${clinic.google_rating ?? "-"}<div class="cell-sub">${clinic.google_reviews ?? "-"} reviews</div></td>
            <td>${clinic.price_notes}</td>
          </tr>
        `).join("");
      }

      document.getElementById("searchInput").addEventListener("input", renderClinicTable);
      document.getElementById("visibilityFilter").addEventListener("change", renderClinicTable);
      document.getElementById("relatedFilter").addEventListener("change", renderClinicTable);

      document.getElementById("doctorList").innerHTML = doctors.map((doctor) => `
        <article class="doctor-card">
          <div class="doctor-head">
            <div>
              <h3 style="font-size:17px;">${doctor.doctor_name}</h3>
              <p style="margin-top:4px; color: var(--muted); font-size: 13px;">${doctor.clinic} · ${doctor.city}</p>
            </div>
            <span class="pill ${toneMap[doctor.priority]}">${doctor.priority}</span>
          </div>
          <div class="doctor-tags">
            <span class="small-tag">${doctorTypeLabel[doctor.doctor_type] || doctor.doctor_type}</span>
            <span class="small-tag">${doctor.ishrs_status}</span>
            <span class="small-tag">ABHRS ${doctor.abhers}</span>
            <span class="small-tag">FUE Europe ${doctor.fue_europe_member}</span>
          </div>
          <div class="accent">${surgeryLabel[doctor.surgery_model] || doctor.surgery_model}</div>
          <div class="doctor-note">${doctor.notes}</div>
        </article>
      `).join("");

      renderClinicTable();

      document.getElementById("steps").innerHTML = steps.map(([no, title, text]) => `
        <article class="step-card">
          <div class="step-wrap">
            <div class="step-no">${no}</div>
            <div>
              <div class="step-title">${title}</div>
              <div class="step-text">${text}</div>
            </div>
          </div>
        </article>
      `).join("");
    </script>
  </body>
</html>
